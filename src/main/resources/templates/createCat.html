<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<p>Velkommen til oprettelse af kæledyr</p>

<form th:action="@{/createCat}" th:object="${cat}" method="post">

    <label> Name </label>
    <input type="text" th:field="*{name}">

    <label> Mom </label>
    <input type="text" th:field="*{mom}">

    <label> Dad </label>
    <input type="text" th:field="*{dad}">

    <label> Color </label>
    <input type="text" th:field="*{color}">

    <label>Race</label>
    <select th:field="*{race}">
        <option th:value="BRITISH_SHORTHAIR">British Shorthair</option>
        <option th:value="MAINE_COON">Maine Coon</option>
        <option th:value="NORSK_SKOVKAT">Norsk Skovkat</option>
    </select>


    <button type="submit">Create</button>

</form>


</body>
</html>
