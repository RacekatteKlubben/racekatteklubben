<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Opret kat – Racekatteklubben</title>
    <link rel="stylesheet" th:href="@{/universal.css}">
</head>
<body>

<div class="container">
    <h2>Opret ny kat</h2>

    <form th:action="@{/createCat}" th:object="${cat}" method="post" enctype="multipart/form-data">

        <label for="name">Navn</label>
        <input type="text" id="name" th:field="*{name}" required>

        <label for="mom">Mor</label>
        <input type="text" id="mom" th:field="*{mom}" required>

        <label for="dad">Far</label>
        <input type="text" id="dad" th:field="*{dad}" required>

        <label for="color">Farve</label>
        <input type="text" id="color" th:field="*{color}" required>

        <label for="race">Race</label>
        <select id="race" th:field="*{race}" required>
            <option th:value="BRITISH_SHORTHAIR">British Shorthair</option>
            <option th:value="MAINE_COON">Maine Coon</option>
            <option th:value="NORSK_SKOVKAT">Norsk Skovkat</option>
        </select>

        <label for="image">Billede af katten</label>
        <input type="file" id="image" name="imageFile" accept="image/*">

        <button type="submit">Opret kat</button>
        <div th:if="${error}" class="error" th:text="${error}"></div>
    </form>

    <div class="links">
        <p>
            <a href="/">Tilbage til forsiden</a>
        </p>
    </div>
</div>

</body>
</html>
