<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" th:href="@{/universal.css}">
    <meta charset="UTF-8">
    <title>Se alle dine katte</title>
</head>

<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste af Katte – Racekatteklubben</title>
    <link rel="stylesheet" th:href="@{/universal.css}">
</head>
<body>

<div class="container">
    <h2>Liste af Katte</h2>

    <table>
        <thead>
        <tr>
            <th>Katte navn</th>
            <th>Mor</th>
            <th>Far</th>
            <th>Farve</th>
            <th>Race</th>
            <th>Billede</th>
            <th>Handlinger</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cat : ${cats}">
            <td th:text="${cat.name}"></td>
            <td th:text="${cat.mom}"></td>
            <td th:text="${cat.dad}"></td>
            <td th:text="${cat.color}"></td>
            <td th:text="${cat.race}"></td>

            <td>
                <img th:src="@{'/catImage/' + ${cat.catId}}" width="100"/>
            </td>

            <td>
                <form th:action="@{/updateCat}" method="get">
                    <input type="hidden" name="catId" th:value="${cat.catId}">
                    <button type="submit">Rediger</button>
                </form>

                <form th:action="@{/deleteCat}" method="post">
                    <input type="hidden" name="catId" th:value="${cat.catId}">
                    <button type="submit">Slet</button>
                </form>
            </td>

        </tr>
        </tbody>
    </table>

    <div class="links">
        <a href="/">Tilbage til forsiden</a>
    </div>
</div>

</body>
</html>
